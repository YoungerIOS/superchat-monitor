<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XChat Monitor (macOS)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1>XChat Monitor</h1>
      </header>

      <section class="panel">
        <div class="row controls">
          <button id="btn-start" class="success">启动服务</button>
          <button id="btn-open" class="primary">打开面板</button>
          <button id="btn-stop">停止服务</button>
          <button id="btn-restart">重启服务</button>
          <button id="btn-status">刷新状态</button>
          <button id="btn-log">查看日志</button>
          <button id="btn-exit" class="danger">退出程序</button>
        </div>
      </section>

      <section class="status">
        <h2>服务状态</h2>
        <div id="status-output" aria-live="polite"></div>
      </section>

      <section class="tips">
        <h2>说明</h2>
        <ul>
          <li>点击「启动服务」时若环境未就绪，会自动进入依赖和 Chromium 的下载安装流程。</li>
          <li>首次安装通常较慢；可先观察状态区进度与提示，必要时点击「查看日志」排查细节。</li>
        </ul>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
