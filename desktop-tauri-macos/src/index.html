<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XChat Monitor (macOS)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1>XChat Monitor</h1>
      </header>

      <section class="panel">
        <div class="row controls">
          <button id="btn-setup" class="accent">安装依赖</button>
          <button id="btn-python-dl" type="button" class="primary" hidden>
            打开 Python 官网
          </button>
          <button id="btn-start" class="success">启动服务</button>
          <button id="btn-open" class="primary">打开面板</button>
          <button id="btn-stop">停止服务</button>
          <button id="btn-restart">重启服务</button>
          <button id="btn-status">刷新状态</button>
          <button id="btn-log">查看日志</button>
          <button id="btn-exit" class="danger">退出程序</button>
        </div>
      </section>

      <section class="status">
        <h2>服务状态</h2>
        <div id="status-output" aria-live="polite"></div>
      </section>

      <section class="tips">
        <h2>说明</h2>
        <ul>
          <li>若软件提示未检测到 Python，请到 <a href="https://www.python.org/downloads/" target="_blank" rel="noopener noreferrer">Python 官网</a> 下载安装后，重启应用再点「安装依赖」。</li>
          <li>首次使用操作顺序：先点「安装依赖」，安装可能耗时较长；完成后再点「启动服务」- 「打开面板」。</li>
          <li>日常使用如果启动失败，先点「刷新状态」查看提示；需要排查细节时点「查看日志」。</li>
        </ul>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
